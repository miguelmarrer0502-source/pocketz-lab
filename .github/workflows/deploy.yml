name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Workers
        id: deploy
        continue-on-error: true
        run: bunx wrangler deploy 2>&1 | tee /tmp/wrangler.log; echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8c571f5fbc29e4559f1cfe2ef0d16ed3

      - name: Post wrangler output as commit comment
        if: always()
        run: |
          OUTPUT=$(cat /tmp/wrangler.log 2>/dev/null | head -100 || echo "No output captured")
          ESCAPED=$(echo "$OUTPUT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -d "{\"body\": \"## Wrangler Output\\n\\n\`\`\`\\n${OUTPUT}\\n\`\`\`\"}"

      - name: Fail if deploy failed
        if: steps.deploy.outputs.exit_code \!= '0'
        run: exit 1
